display_name: Slop UI Cleanup
short_description: Research-first 8-agent UI cleanup and design-quality pass
default_prompt: Clean up this UI with the slop-ui-cleanup workflow. Research first, have each of the 8 UI lanes produce a critical assessment and recommendations, then implement all high-confidence UI improvements and verify the result. Focus on design quality, modularity, hierarchy, and interface clarity rather than backend or application logic.
